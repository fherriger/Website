<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Fabian Herriger</title>
  <meta name="description" content="Fabian Herriger – Freier Journalist und Autor in Berlin.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <style>
    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: "IBM Plex Mono", monospace;
      font-size: 15px;
      line-height: 1.75;
    }

    .page {
      max-width: 820px;
      margin: 0 auto;
      padding: 140px 28px 60px;
    }

    .block {
      max-width: 520px;
      margin: 0 auto;
    }

    h1, p, ul {
      margin: 0;
      font-weight: normal;
    }

    h1 {
      font-size: 24px;
      margin-bottom: 18px;
    }

    .meta {
      margin-bottom: 34px;
    }

    .contact {
      margin-bottom: 42px;
    }

    .contact a {
      color: #111111;
      text-decoration: none;
    }

    .contact a span {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    ul {
      list-style: none;
      padding: 0;
      margin: 0 0 56px;
    }

    li {
      margin-bottom: 20px;
    }

    .label {
      display: block;
      margin-bottom: 4px;
    }

    a {
      color: #111111;
      text-decoration: underline;
      text-underline-offset: 3px;
      overflow-wrap: break-word;
    }

    a:hover {
      opacity: 0.7;
    }

    footer {
      color: #666666;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      body {
        font-size: 14px;
      }

      .page {
        padding: 90px 20px 40px;
      }

      .block {
        max-width: 100%;
      }

      h1 {
        font-size: 21px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="block">
      <h1>Fabian Herriger</h1>

      <p class="meta">
        Freier Journalist und Autor<br>
        Berlin
      </p>

      <p class="contact">
        <a href="mailto:post@fabianherriger.de" aria-label="E-Mail an Fabian Herriger senden">
          ✉ <span>post@fabianherriger.de</span>
        </a>
      </p>

      <ul>
        <li>
          <span class="label">Film</span>
          <a href="https://www.arte.tv/de/videos/115519-014-A/was-macht-uns-depressiv/" target="_blank" rel="noopener noreferrer">
            Was macht uns depressiv?
          </a>
        </li>

        <li>
          <span class="label">Text</span>
          <a href="https://www.vice.com/de/article/ich-sass-24-stunden-in-einer-eckkneipe/" target="_blank" rel="noopener noreferrer">
            Ich saß 24 Stunden in einer Eckkneipe
          </a>
        </li>

        <li>
          <span class="label">Buch</span>
          <a href="https://www.thegentletemper.com/products/take-me-to-the-lakes-bicycle-edition-berlin?srsltid=AfmBOoqwytWbnMR203fCZz-iq1nt21f_D-rpcOfo3T3zrmktbE-IKqTo" target="_blank" rel="noopener noreferrer">
            Take Me to the Lakes — Bicycle Edition Berlin
          </a>
        </li>
      </ul>

      <footer>
        2026
      </footer>
    </div>
  </main>
</body>
</html>
